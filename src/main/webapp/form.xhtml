<?xml version="1.0" encoding="UTF-8"?>
<!DOCTYPE html PUBLIC "-//W3C//DTD XHTML 1.0 Transitional//EN"
        "http://www.w3.org/TR/xhtml1/DTD/xhtml1-transitional.dtd">

<html xmlns="http://www.w3.org/1999/xhtml"
      xmlns:h="http://xmlns.jcp.org/jsf/html"
      xmlns:f="http://xmlns.jcp.org/jsf/core">

<h:head>
    <title>Gestion des Etudiants</title>
</h:head>

<h:body>

    <h:form id="studentForm">

        <h2>Formulaire Etudiant</h2>

        <h:panelGrid columns="2" cellpadding="6">

            <h:outputLabel for="nom" value="Nom :" />
            <h:inputText id="nom"
                         value="#{studentBean.student.nom}"
                         required="true"/>

            <h:outputLabel for="prenom" value="Prenom :" />
            <h:inputText id="prenom"
                         value="#{studentBean.student.prenom}"
                         required="true"/>

            <h:outputLabel for="email" value="Email :" />
            <h:inputText id="email"
                         value="#{studentBean.student.email}"
                         required="true"/>

        </h:panelGrid>

        <br/>

        <h:commandButton value="Enregistrer"
                         action="#{studentBean.addStudent}" />

        <h:commandButton value="Reinitialiser"
                         type="reset"/>

        <br/><br/>

        <h:messages style="color:red"/>

        <hr/>

        <h2>Liste des Etudiants</h2>

        <h:dataTable value="#{studentBean.students}"
                     var="s"
                     border="1"
                     cellpadding="5">

            <h:column>
                <f:facet name="header">ID</f:facet>
                #{s.id}
            </h:column>

            <h:column>
                <f:facet name="header">Nom</f:facet>
                #{s.nom}
            </h:column>

            <h:column>
                <f:facet name="header">Prenom</f:facet>
                #{s.prenom}
            </h:column>

            <h:column>
                <f:facet name="header">Email</f:facet>
                #{s.email}
            </h:column>

            <h:column>
                <f:facet name="header">Action</f:facet>

                <h:commandButton value="Delete"
                                 action="#{studentBean.deleteStudent(s.id)}" />

            </h:column>

        </h:dataTable>

    </h:form>

</h:body>
</html>
